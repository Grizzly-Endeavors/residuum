name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  checks:
    name: CI Checks
    runs-on: lab-runners

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[0-9]+|-test)?$'; then
            echo "::error::Tag '$TAG' does not match CalVer format vYYYY.0M.0D(-N|-test)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Web format check
        id: web_format
        run: cd web && npm run format:check

      - name: Web lint
        id: web_lint
        run: cd web && npm run lint

      - name: Web type check
        id: web_typecheck
        run: cd web && npm run check

      - name: Build web assets
        run: cd web && npm run build

      - name: Check formatting
        id: fmt
        run: cargo fmt --check

      - name: Clippy
        id: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        id: test
        run: cargo test --quiet

      - name: Dependency audit
        id: deny
        run: cargo deny check

      - name: Build summary
        if: always()
        run: |
          echo '## CI Check Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Check | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|-------|--------|' >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Format | ${{ steps.web_format.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Lint | ${{ steps.web_lint.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Types | ${{ steps.web_typecheck.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format | ${{ steps.fmt.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clippy | ${{ steps.clippy.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ steps.test.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deny | ${{ steps.deny.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (${{ matrix.artifact }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: '"lab-runners"'
            artifact: residuum-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: '"lab-runners"'
            artifact: residuum-linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            runner: '"macos-15"'
            artifact: residuum-macos-aarch64

    runs-on: ${{ fromJSON(matrix.runner) }}

    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Add target
        if: matrix.cross
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/residuum ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p Residuum.app/Contents/MacOS
          cp bundle/Info.plist Residuum.app/Contents/Info.plist
          cp target/${{ matrix.target }}/release/residuum Residuum.app/Contents/MacOS/residuum
          codesign -s - -f --deep Residuum.app
          ditto -c -k --keepParent Residuum.app Residuum-macos.app.zip

      - name: Upload macOS app bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Residuum-macos
          path: Residuum-macos.app.zip

  mac-check:
    name: Check mac/ changes
    needs: checks
    runs-on: lab-runners

    outputs:
      changed: ${{ steps.diff.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect mac/ changes
        id: diff
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}' | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found — treating as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Comparing $PREVIOUS_TAG..$CURRENT_TAG"
          if git diff --name-only "$PREVIOUS_TAG".."$CURRENT_TAG" -- mac/ | grep -q .; then
            echo "mac/ has changes"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "mac/ has no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  mac-app:
    name: Build macOS Chat App
    needs: [checks, mac-check]
    if: needs.mac-check.outputs.changed == 'true'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build archive
        run: |
          cd mac
          xcodebuild archive \
            -scheme ResiduumChat \
            -configuration Release \
            -archivePath build/ResiduumChat.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app
        run: |
          cd mac/build/ResiduumChat.xcarchive/Products/Applications
          ditto -c -k --keepParent "Residuum Chat.app" "$GITHUB_WORKSPACE/ResiduumChat-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResiduumChat-macos
          path: ResiduumChat-macos.zip

  docker:
    name: Docker Image
    needs: [checks, build]
    runs-on: lab-runners

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: residuum-linux-*
          path: docker-context

      - name: Prepare binaries
        run: |
          cp docker-context/residuum-linux-x86_64/residuum-linux-x86_64 docker-context/residuum-amd64
          cp docker-context/residuum-linux-aarch64/residuum-linux-aarch64 docker-context/residuum-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker/Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/grizzly-endeavors/residuum:${{ needs.checks.outputs.version }}
            ${{ !endsWith(needs.checks.outputs.tag, '-test') && 'ghcr.io/grizzly-endeavors/residuum:latest' || '' }}

  release:
    name: Create Release
    needs: [checks, build, mac-app]
    if: always() && !failure() && !cancelled()
    runs-on: lab-runners

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Download macOS chat app
        if: needs.mac-app.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ResiduumChat-macos
          path: release-artifacts/ResiduumChat-macos

      - name: Create GitHub Release
        if: "!endsWith(needs.checks.outputs.tag, '-test')"
        run: |
          ASSETS=(
            release-artifacts/residuum-linux-x86_64/residuum-linux-x86_64
            release-artifacts/residuum-linux-aarch64/residuum-linux-aarch64
            release-artifacts/residuum-macos-aarch64/residuum-macos-aarch64
            release-artifacts/Residuum-macos/Residuum-macos.app.zip
          )
          if [ -f "release-artifacts/ResiduumChat-macos/ResiduumChat-macos.zip" ]; then
            ASSETS+=("release-artifacts/ResiduumChat-macos/ResiduumChat-macos.zip")
          fi
          gh release create "${{ needs.checks.outputs.tag }}" \
            --generate-notes \
            "${ASSETS[@]}"

      - name: Test tag summary
        if: endsWith(needs.checks.outputs.tag, '-test')
        run: |
          echo "::notice::Test tag — skipping GitHub release creation"
          echo "Artifacts that would have been released:"
          ls -la release-artifacts/*/

      - name: Build summary
        if: always()
        run: |
          echo '## Release Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ needs.checks.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ needs.checks.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Artifact | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|----------|--------|' >> "$GITHUB_STEP_SUMMARY"
          for name in residuum-linux-x86_64 residuum-linux-aarch64 residuum-macos-aarch64 Residuum-macos; do
            if [ -d "release-artifacts/$name" ]; then
              echo "| $name | uploaded |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | missing |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "${{ needs.mac-app.result }}" = "success" ]; then
            echo "| ResiduumChat-macos | uploaded |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.mac-app.result }}" = "skipped" ]; then
            echo "| ResiduumChat-macos | skipped (no mac/ changes) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ResiduumChat-macos | ${{ needs.mac-app.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
