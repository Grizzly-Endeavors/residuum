name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  checks:
    name: CI Checks
    runs-on: [self-hosted, kubernetes, lab]

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[0-9]+)?$'; then
            echo "::error::Tag '$TAG' does not match CalVer format vYYYY.0M.0D(-N)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Web format check
        id: web_format
        run: cd web && npm run format:check

      - name: Web lint
        id: web_lint
        run: cd web && npm run lint

      - name: Web type check
        id: web_typecheck
        run: cd web && npm run check

      - name: Build web assets
        run: cd web && npm run build

      - name: Check formatting
        id: fmt
        run: cargo fmt --check

      - name: Clippy
        id: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        id: test
        run: cargo test --quiet

      - name: Dependency audit
        id: deny
        run: cargo deny check

      - name: Build summary
        if: always()
        run: |
          echo '## CI Check Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Check | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|-------|--------|' >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Format | ${{ steps.web_format.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Lint | ${{ steps.web_lint.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web Types | ${{ steps.web_typecheck.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format | ${{ steps.fmt.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clippy | ${{ steps.clippy.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ steps.test.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deny | ${{ steps.deny.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (${{ matrix.artifact }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: '["self-hosted","kubernetes","lab"]'
            artifact: residuum-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: '["self-hosted","kubernetes","lab"]'
            artifact: residuum-linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            runner: '"macos-15"'
            artifact: residuum-macos-aarch64

    runs-on: ${{ fromJSON(matrix.runner) }}

    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Add target
        if: matrix.cross
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/residuum ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [checks, build]
    runs-on: [self-hosted, kubernetes, lab]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.checks.outputs.tag }}" \
            --generate-notes \
            release-artifacts/residuum-linux-x86_64/residuum-linux-x86_64 \
            release-artifacts/residuum-linux-aarch64/residuum-linux-aarch64 \
            release-artifacts/residuum-macos-aarch64/residuum-macos-aarch64

      - name: Build summary
        if: always()
        run: |
          echo '## Release Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ needs.checks.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ needs.checks.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Artifact | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|----------|--------|' >> "$GITHUB_STEP_SUMMARY"
          for artifact in release-artifacts/*/; do
            name=$(basename "$artifact")
            if [ -f "$artifact/$name" ]; then
              echo "| $name | uploaded |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | missing |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
