# IronClaw example configuration — all options with defaults shown.
# Copy to config.toml and edit as needed.

# ── User name (optional) ─────────────────────────────────────────────────────
# What the agent should call you. Stored in USER.md on first run.
# name = "Alex"

# ── Timezone (REQUIRED) ──────────────────────────────────────────────────────
# IANA timezone name for all timestamps. Affects daily logs, memory
# observations, pulse active hours, and all stored data.
#
# WARNING: Changing this value after initial setup is NOT recommended.
# Existing timestamps will not be retroactively converted.
#
# Examples: "America/New_York", "Europe/London", "Asia/Tokyo", "UTC"
timezone = "America/New_York"

# ── Providers (optional, define named connections) ────────────────────────────
# Each entry specifies a connection to a model API. The key becomes a name you
# can reference in [models]. The `type` field selects the protocol:
#   anthropic, openai, ollama, gemini
#
# API keys support three formats:
#   Plaintext:     api_key = "sk-ant-..."
#   Env var:       api_key = "${ANTHROPIC_API_KEY}"
#   Secret store:  api_key = "secret:anthropic_key"
#
# Use 'ironclaw secret set anthropic_key' to store encrypted secrets.
#
# [providers]
# cerebras = { type = "openai", api_key = "csk-...", url = "https://api.cerebras.ai/v1" }
# claude-max = { type = "anthropic", api_key = "${ANTHROPIC_API_KEY}" }
# google-api = { type = "gemini", api_key = "secret:gemini_key" }

# ── Models (role assignments) ─────────────────────────────────────────────────
# Format: "provider_or_type/model_name"
# If the part before / matches a [providers] entry, that connection is used.
# Otherwise it is treated as an implicit provider type (anthropic, openai, etc.)
# and the API key is read from the provider-specific env var or IRONCLAW_API_KEY.
#
# Roles: main (required), default (fallback for unset roles), observer,
#        reflector, pulse
#
# Failover: use an array to specify fallback providers. If the primary fails
# (after retries), the next provider in the list is tried:
#   main = ["anthropic/claude-sonnet-4-6", "openai/gpt-4o"]
[models]
main = "anthropic/claude-sonnet-4-6"
# default = "anthropic/claude-haiku-4-5"
# observer = "google-api/gemini-3.0-flash"
# reflector = "google-api/gemini-3.0-flash"
# pulse = "anthropic/claude-haiku-4-5"
# embedding = "openai/text-embedding-3-small"

# ── General settings ──────────────────────────────────────────────────────────
# workspace_dir = "~/.ironclaw/workspace"
timeout_secs = 120
max_tokens = 8192

# ── Retry (optional, defaults shown) ─────────────────────────────────────────
# [retry]
# max_retries = 3
# initial_delay_ms = 500
# max_delay_ms = 30000
# backoff_multiplier = 2.0

# ── Memory subsystem ──────────────────────────────────────────────────────────
[memory]
observer_threshold_tokens = 30000       # soft threshold: starts cooldown timer
reflector_threshold_tokens = 40000
observer_cooldown_secs = 120            # seconds to wait after soft threshold before observing
observer_force_threshold_tokens = 60000 # hard threshold: observe immediately, bypass cooldown

# Hybrid search tuning (BM25 + vector merge).
# [memory.search]
# vector_weight = 0.7              # weight for vector similarity (0.0–1.0)
# text_weight = 0.3                # weight for BM25 text scores (0.0–1.0)
# min_score = 0.35                 # minimum hybrid score threshold
# candidate_multiplier = 4         # over-fetch multiplier for pre-merge retrieval
# temporal_decay = false            # enable temporal decay scoring
# temporal_decay_half_life_days = 30.0

# ── Pulse (ambient monitoring) ────────────────────────────────────────────────
[pulse]
enabled = true

# ── WebSocket gateway ─────────────────────────────────────────────────────────
[gateway]
bind = "127.0.0.1"
port = 7700

# ── Discord bot (optional, requires --features discord) ──────────────────────
# Bot token can be set here or via IRONCLAW_DISCORD_TOKEN env var.
# Supports ${ENV_VAR} syntax for referencing environment variables.
# Currently DM-only; guild channels, slash commands, and presence are planned.
#
# [discord]
# token = "${IRONCLAW_DISCORD_TOKEN}"

# ── Skills (optional, extra scan directories) ────────────────────────────────
# The workspace skills/ directory is always scanned. Add extra directories here.
#
# [skills]
# dirs = ["~/my-skills", "/opt/shared-skills"]

# ── Webhook endpoint (optional) ──────────────────────────────────────────────
# Enables POST /webhook on the gateway server. If secret is set, requests
# must include an Authorization: Bearer <secret> header.
#
# [webhook]
# enabled = false
# secret = "your-webhook-secret"

# ── Notifications (optional, external channel routing) ─────────────────────
# Named channels for routing background task results and alerts.
# Supported types: ntfy, webhook
#
# [notifications.channels.push-notify]
# type = "ntfy"
# url = "https://ntfy.sh"
# topic = "my-alerts"
# priority = "high"                # optional, default: "default"
#
# [notifications.channels.slack-webhook]
# type = "webhook"
# url = "https://hooks.slack.com/services/..."
# method = "POST"                  # optional, default: "POST"
# headers = { Authorization = "Bearer token" }

# ── Background tasks (optional) ───────────────────────────────────────────
# Semaphore-bounded concurrent background tasks (sub-agents and scripts).
# Model tiers fall back: tier → next tier up → main.
#
# [background]
# max_concurrent = 3
# transcript_retention_days = 30
#
# [background.models]
# small = "anthropic/claude-haiku-4-5"
# medium = "anthropic/claude-sonnet-4-6"
# large = ["anthropic/claude-sonnet-4-6", "openai/gpt-4o"]

# ── MCP servers (optional, always-on tool servers) ───────────────────────
# Servers defined here start on gateway boot and stay running.
# Project-scoped MCP servers are defined in PROJECT.md frontmatter instead.
#
# [mcp.servers.filesystem]
# command = "mcp-server-filesystem"
# args = ["/home/user/documents"]
# env = { MCP_LOG = "debug" }
