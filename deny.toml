# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2026-0049", # rustls-webpki CRL matching — transitive via serenity/tokio-tungstenite/rustls 0.22; no patched 0.102.x available
    "RUSTSEC-2026-0098", # rustls-webpki name-constraints (URI) — same transitive TLS-stack surface as 0049, affecting 0.102.8 and 0.103.10; no patched versions available
    "RUSTSEC-2026-0099", # rustls-webpki name-constraints (wildcards) — same transitive TLS-stack surface as 0049; no patched versions available
    "RUSTSEC-2026-0104", # rustls-webpki reachable panic in CRL parsing — transitive via serenity/rustls 0.22; residuum does not use CRLs
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
