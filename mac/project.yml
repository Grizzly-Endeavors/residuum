name: ResiduumChat
options:
  bundleIdPrefix: com.grizzly-endeavors
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  ResiduumChat:
    type: application
    platform: macOS
    sources:
      - path: Residuum
    resources:
      - path: Residuum/Resources/Fonts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grizzly-endeavors.residuum-chat
        PRODUCT_NAME: "Residuum Chat"
        PRODUCT_MODULE_NAME: Residuum
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_FILE: Residuum/Info.plist
        SWIFT_VERSION: "5.9"
    preBuildScripts: []

  ResiduumChatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ResiduumTests
    dependencies:
      - target: ResiduumChat
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Residuum Chat.app/Contents/MacOS/Residuum Chat"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ResiduumChat:
    build:
      targets:
        ResiduumChat: all
        ResiduumChatTests: [test]
    test:
      targets:
        - ResiduumChatTests
