name: Residuum
options:
  bundleIdPrefix: com.grizzly-endeavors
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  Residuum:
    type: application
    platform: macOS
    sources:
      - path: Residuum
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grizzly-endeavors.residuum-mac
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_FILE: Residuum/Info.plist
        SWIFT_VERSION: "5.9"
    preBuildScripts: []

  ResiduumTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ResiduumTests
    dependencies:
      - target: Residuum
    settings:
      base:
        SWIFT_VERSION: "5.9"
